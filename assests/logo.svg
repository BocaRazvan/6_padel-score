 <!-- SVG Code -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" class="w-full h-auto drop-shadow-sm">
            <defs>
                <!-- Gradients -->
                <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#1e293b" />
                    <stop offset="100%" stop-color="#0f172a" />
                </linearGradient>
                
                <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#334155" />
                    <stop offset="100%" stop-color="#1e293b" />
                </linearGradient>

                <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00E5FF" />
                    <stop offset="100%" stop-color="#008B99" />
                </linearGradient>

                <radialGradient id="ballGrad" cx="30%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#E8FF5C" />
                    <stop offset="70%" stop-color="#CCFF00" />
                    <stop offset="100%" stop-color="#99C200" />
                </radialGradient>

                <!-- Updated Light Text Gradient -->
                <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#94a3b8" />
                </linearGradient>

                <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#cbd5e1" stop-opacity="0" />
                    <stop offset="20%" stop-color="#cbd5e1" stop-opacity="1" />
                    <stop offset="80%" stop-color="#cbd5e1" stop-opacity="1" />
                    <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0" />
                </linearGradient>

                <!-- Drop Shadow Filter -->
                <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.3" />
                </filter>

                <!-- Padel Ball Definition -->
                <g id="padel-ball">
                    <circle cx="0" cy="0" r="9" fill="url(#ballGrad)" />
                    <!-- Tennis/Padel Seams -->
                    <path d="M -6 -4 A 5.5 5.5 0 0 0 -6 4 M 6 -4 A 5.5 5.5 0 0 1 6 4" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
                    <!-- Motion Blur/Spin Overlay -->
                    <circle cx="0" cy="0" r="9" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 4">
                        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.5s" repeatCount="indefinite" />
                    </circle>
                </g>

                <!-- Motion Path -->
                <path id="bounce-path" d="M 100 100 Q 175 -10, 250 140 Q 320 30, 390 140 Q 455 60, 520 140 Q 565 90, 610 140 Q 635 120, 660 140" fill="none" />
            </defs>

            <!-- Background Floor Line -->
            <path d="M 140 140 L 600 140" stroke="url(#floorGrad)" stroke-width="3" stroke-linecap="round" />

            <!-- Stylish Text: Elite Padel -->
            <text x="180" y="135" filter="url(#drop-shadow)">
                <tspan font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="300" font-size="60" fill="#00E5FF" letter-spacing="2">Elite</tspan>
                <tspan font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="65" fill="url(#textGrad)" font-style="italic" dx="15" letter-spacing="1">PADEL</tspan>
            </text>

            <!-- Racket Group -->
            <g transform="translate(100, 100) rotate(35)" filter="url(#drop-shadow)">
                
                <!-- Safety Cord -->
                <path d="M 0 138 C -20 155, 20 165, -5 180" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>

                <!-- Handle Base Cap -->
                <rect x="-14" y="130" width="28" height="10" rx="3" fill="#0f172a" />

                <!-- Handle Overgrip -->
                <rect x="-12" y="75" width="24" height="58" rx="2" fill="#f8fafc" />
                <path d="M -12 85 L 12 95 M -12 100 L 12 110 M -12 115 L 12 125" stroke="#cbd5e1" stroke-width="2" />

                <!-- Throat Arms (Split Bridge) -->
                <path d="M -26 35 C -15 50, -12 65, -12 78 L -2 78 C -2 60, -8 45, -18 35 Z" fill="url(#frameGrad)" />
                <path d="M 26 35 C 15 50, 12 65, 12 78 L 2 78 C 2 60, 8 45, 18 35 Z" fill="url(#frameGrad)" />
                <path d="M -12 76 L 12 76" stroke="url(#frameGrad)" stroke-width="6" />

                <!-- Racket Head / Frame -->
                <ellipse cx="0" cy="0" rx="48" ry="58" fill="url(#faceGrad)" stroke="url(#frameGrad)" stroke-width="8" />
                
                <!-- Inner Cyan Accent -->
                <ellipse cx="0" cy="0" rx="44" ry="54" fill="none" stroke="#00E5FF" stroke-width="2" />
                <ellipse cx="0" cy="0" rx="41" ry="51" fill="none" stroke="#0f172a" stroke-width="1" opacity="0.5" />

                <!-- Racket Face Holes -->
                <g fill="#0f172a" opacity="0.8">
                    <!-- Center Vertical -->
                    <circle cx="0" cy="-35" r="3.5"/>
                    <circle cx="0" cy="-17.5" r="3.5"/>
                    <circle cx="0" cy="0" r="3.5"/>
                    <circle cx="0" cy="17.5" r="3.5"/>
                    <circle cx="0" cy="35" r="3.5"/>
                    
                    <!-- Left Side 1 -->
                    <circle cx="-16" cy="-26.5" r="3.5"/>
                    <circle cx="-16" cy="-9" r="3.5"/>
                    <circle cx="-16" cy="8.5" r="3.5"/>
                    <circle cx="-16" cy="26.5" r="3.5"/>

                    <!-- Left Side 2 -->
                    <circle cx="-32" cy="-17.5" r="3.5"/>
                    <circle cx="-32" cy="0" r="3.5"/>
                    <circle cx="-32" cy="17.5" r="3.5"/>

                    <!-- Right Side 1 -->
                    <circle cx="16" cy="-26.5" r="3.5"/>
                    <circle cx="16" cy="-9" r="3.5"/>
                    <circle cx="16" cy="8.5" r="3.5"/>
                    <circle cx="16" cy="26.5" r="3.5"/>

                    <!-- Right Side 2 -->
                    <circle cx="32" cy="-17.5" r="3.5"/>
                    <circle cx="32" cy="0" r="3.5"/>
                    <circle cx="32" cy="17.5" r="3.5"/>
                </g>
            </g>

            <!-- Impact Ring Animation (Synchronized with ball hit) -->
            <circle cx="100" cy="100" r="0" fill="none" stroke="#00E5FF" stroke-width="4">
                <animate attributeName="r" values="0; 35; 45" keyTimes="0; 0.1; 1" dur="2s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="1; 0; 0" keyTimes="0; 0.15; 1" dur="2s" repeatCount="indefinite" />
            </circle>
            
            <circle cx="100" cy="100" r="0" fill="none" stroke="#CCFF00" stroke-width="2">
                <animate attributeName="r" values="0; 20; 30" keyTimes="0; 0.1; 1" dur="2s" repeatCount="indefinite" begin="0.05s" />
                <animate attributeName="opacity" values="1; 0; 0" keyTimes="0; 0.15; 1" dur="2s" repeatCount="indefinite" begin="0.05s" />
            </circle>

            <!-- Animated Bouncing Ball with Trail -->
            
            <!-- Trail 2 (Farthest back) -->
            <g opacity="0.25">
                <use href="#padel-ball" transform="scale(0.55)">
                    <animateMotion dur="2s" repeatCount="indefinite" begin="0s">
                        <mpath href="#bounce-path" />
                    </animateMotion>
                </use>
            </g>

            <!-- Trail 1 (Middle) -->
            <g opacity="0.5">
                <use href="#padel-ball" transform="scale(0.75)">
                    <animateMotion dur="2s" repeatCount="indefinite" begin="-0.04s">
                        <mpath href="#bounce-path" />
                    </animateMotion>
                </use>
            </g>

            <!-- Main Padel Ball (Front) -->
            <g filter="url(#drop-shadow)">
                <use href="#padel-ball">
                    <animateMotion dur="2s" repeatCount="indefinite" begin="-0.08s">
                        <mpath href="#bounce-path" />
                    </animateMotion>
                </use>
            </g>
        </svg>