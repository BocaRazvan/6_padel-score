<script>
  // This tiny script takes the high-res image URL from the thumbnail you click
  // and puts it into the full-screen modal!
  const lightboxModal = document.getElementById('lightboxModal');
  lightboxModal.addEventListener('show.bs.modal', event => {
    const triggerItem = event.relatedTarget; // The gallery-item you clicked
    const imageUrl = triggerItem.getAttribute('data-image-url'); // Grab the image path
    const modalImage = document.getElementById('lightboxImage');
    
    modalImage.src = imageUrl; // Set the full-screen image!
  });
</script>
