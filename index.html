<!-- BOOTSTRAP JS ------------------------------------------------------------------------------------>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- TIMER JS------------------------------------------------------------------------------------>
<script>

// SET THE DATE HERE (Year, Month [0-11], Day, Hour, Minute)
const targetDate = new Date("Apr 11, 2026 18:00:00").getTime();

const updateCountdown = () => {
  const now = new Date().getTime();
  const gap = targetDate - now;

  // Time calculations
  const second = 1000;
  const minute = second * 60;
  const hour = minute * 60;
  const day = hour * 24;

  // Calculate remaining units
  const d = Math.floor(gap / day);
  const h = Math.floor((gap % day) / hour);
  const m = Math.floor((gap % hour) / minute);
  const s = Math.floor((gap % minute) / second);

  // Update HTML
  document.getElementById("days").innerText = d < 10 ? "0" + d : d;
  document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
  document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
  document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

  // If countdown is finished
  if (gap < 0) {
    document.getElementById("countdown").innerHTML = "<h2 class='text-primary'>Meciul a început!</h2>";
  }
};

// Run every second
setInterval(updateCountdown, 1000);

// Run once immediately so there is no 1-second delay on load
updateCountdown();
</script>
